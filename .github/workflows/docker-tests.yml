name: Docker API Tests

on:
  push:
    tags:
      - "v*"

jobs:
  verify-main-tag:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check tag commit is on main
      run: |
        git fetch origin +refs/heads/main:refs/remotes/origin/main
        tag_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
        main_commit="$(git rev-parse origin/main)"
        echo "Tag commit: $tag_commit"
        echo "origin/main: $main_commit"
        if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
          echo "Tag $GITHUB_REF_NAME does not point to a commit on main."
          exit 1
        fi

  build-and-publish:
    needs: verify-main-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest numba
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
        python -m pip install .

    - name: Build Docker image
      run: docker build -t mytestimage .

    - name: Run Docker container
      run: docker run -d --name mytestcontainer -p 7637:7637 mytestimage

    - name: Run tests
      run: pytest tests/docker_tests/
      env:
        LYNSE_REMOTE_BASE_URL: http://127.0.0.1:7637

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker images
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: birchkwok/lynsedb:latest
        platforms: linux/amd64, linux/arm64

    - name: Cleanup
      if: always()
      run: docker stop mytestcontainer && docker rm mytestcontainer
