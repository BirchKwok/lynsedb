name: Python API Tests

on:
  push:
    tags:
      - "v*"

jobs:
  verify-main-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag commit is on main
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          main_commit="$(git rev-parse origin/main)"
          echo "Tag commit: $tag_commit"
          echo "origin/main: $main_commit"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Tag $GITHUB_REF_NAME does not point to a commit on main."
            exit 1
          fi

  build:
    needs: verify-main-tag
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest numba
        if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
        python -m pip install .
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest tests/standard_tests/
