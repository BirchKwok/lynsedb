name: Python API Tests

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test and publish, for example v0.4.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-main-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve-tag.outputs.tag_name }}
      tag_commit: ${{ steps.resolve-tag.outputs.tag_commit }}
      package_kind: ${{ steps.check-version.outputs.package_kind }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: resolve-tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z]+)*$ ]]; then
            echo "Release tag must look like v0.4.0; got '$RELEASE_TAG'."
            exit 1
          fi
          git fetch origin +refs/tags/*:refs/tags/* +refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          echo "tag_name=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"
      - name: Check tag commit is on main
        run: |
          tag_commit="${{ steps.resolve-tag.outputs.tag_commit }}"
          main_commit="$(git rev-parse origin/main)"
          echo "Tag commit: $tag_commit"
          echo "origin/main: $main_commit"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Tag ${{ steps.resolve-tag.outputs.tag_name }} does not point to a commit on main."
            exit 1
          fi
      - name: Check package version matches tag
        id: check-version
        run: |
          git checkout --detach "${{ steps.resolve-tag.outputs.tag_commit }}"
          python - <<'PY'
          import ast
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          tag = "${{ steps.resolve-tag.outputs.tag_name }}"
          if Path("pyproject.toml").exists():
              package_kind = "maturin"
              version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          elif Path("setup.py").exists():
              package_kind = "legacy"
              version = None
              tree = ast.parse(Path("setup.py").read_text())
              for node in ast.walk(tree):
                  if isinstance(node, ast.Call) and getattr(node.func, "id", "") == "setup":
                      for keyword in node.keywords:
                          if keyword.arg == "version" and isinstance(keyword.value, ast.Constant):
                              version = keyword.value.value
                              break
                  if version:
                      break
              if not version:
                  sys.exit("Could not resolve package version from setup.py.")
          else:
              sys.exit("Neither pyproject.toml nor setup.py exists at this tag.")

          expected = tag.removeprefix("v")
          if version != expected:
              sys.exit(f"Package version {version!r} does not match tag {tag!r}.")

          if not re.match(r"^[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z]+)*$", version):
              sys.exit(f"Invalid package version: {version!r}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              print(f"package_kind={package_kind}", file=output)
          PY

  build:
    needs: verify-main-tag
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.verify-main-tag.outputs.tag_name }}
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up Rust
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      uses: dtolnay/rust-toolchain@stable
    - name: Ensure Cargo.lock exists
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      run: |
        if [ ! -f Cargo.lock ]; then
          cargo generate-lockfile
        fi
    - name: Install dependencies
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest numba
        if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
        python -m pip install --config-settings=maturin.build-args=--locked .
    - name: Lint with flake8
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      run: |
        pytest tests/standard_tests/
    - name: Legacy release tag
      if: needs.verify-main-tag.outputs.package_kind == 'legacy'
      run: |
        echo "Legacy setup.py tag detected; skipping current Rust-backed test matrix."

  build-wheels:
    needs: [verify-main-tag, build]
    name: Build wheels (${{ matrix.platform.os }}, ${{ matrix.platform.target }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        platform:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            # manylinux2014's aarch64 cross-GCC is too old for libmimalloc-sys.
            manylinux: "2_28"
          - os: macos-15-intel
            target: x86_64
            manylinux: auto
          - os: macos-14
            target: aarch64
            manylinux: auto

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.verify-main-tag.outputs.tag_name }}
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up Rust
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      uses: dtolnay/rust-toolchain@stable
    - name: Ensure Cargo.lock exists
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      run: |
        if [ ! -f Cargo.lock ]; then
          cargo generate-lockfile
        fi
    - name: Set up QEMU for Linux aarch64 wheels
      if: needs.verify-main-tag.outputs.package_kind == 'maturin' && runner.os == 'Linux' && matrix.platform.target == 'aarch64'
      uses: docker/setup-qemu-action@v4
      with:
        platforms: arm64
    - name: Build wheel
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      uses: PyO3/maturin-action@v1
      with:
        command: build
        target: ${{ matrix.platform.target }}
        args: --release --locked --out dist --interpreter python${{ matrix.python-version }}
        manylinux: ${{ matrix.platform.manylinux }}
    - name: Build legacy wheel
      if: needs.verify-main-tag.outputs.package_kind == 'legacy' && matrix.platform.os == 'ubuntu-latest' && matrix.platform.target == 'x86_64' && matrix.python-version == '3.11'
      run: |
        python -m pip install --upgrade pip build wheel
        if [ -f requirements.txt ] && [ ! -f ../requirements.txt ]; then
          cp requirements.txt ../requirements.txt
        fi
        python -m build --wheel --outdir dist
    - name: Upload wheel
      if: needs.verify-main-tag.outputs.package_kind == 'maturin' || (needs.verify-main-tag.outputs.package_kind == 'legacy' && matrix.platform.os == 'ubuntu-latest' && matrix.platform.target == 'x86_64' && matrix.python-version == '3.11')
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}-py${{ matrix.python-version }}
        path: dist/*.whl
        if-no-files-found: error

  build-sdist:
    needs: [verify-main-tag, build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.verify-main-tag.outputs.tag_name }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Set up Rust
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      uses: dtolnay/rust-toolchain@stable
    - name: Ensure Cargo.lock exists
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      run: |
        if [ ! -f Cargo.lock ]; then
          cargo generate-lockfile
        fi
    - name: Build source distribution
      if: needs.verify-main-tag.outputs.package_kind == 'maturin'
      uses: PyO3/maturin-action@v1
      with:
        command: sdist
        args: --out dist
    - name: Build legacy source distribution
      if: needs.verify-main-tag.outputs.package_kind == 'legacy'
      run: |
        python -m pip install --upgrade pip build wheel
        if [ -f requirements.txt ] && [ ! -f ../requirements.txt ]; then
          cp requirements.txt ../requirements.txt
        fi
        python -m build --sdist --outdir dist
    - name: Upload source distribution
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz
        if-no-files-found: error

  github-release:
    needs: [verify-main-tag, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout release notes source
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.repository.default_branch }}
    - name: Download distributions
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true
    - name: List distributions
      run: ls -lh dist
    - name: Prepare release notes
      env:
        TAG_NAME: ${{ needs.verify-main-tag.outputs.tag_name }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        python - <<'PY'
        import os
        import re
        from pathlib import Path

        tag = os.environ["TAG_NAME"]
        changelog = Path("docs/releases.md")
        output = Path("release-notes.md")

        if changelog.exists():
            text = changelog.read_text()
            match = re.search(
                rf"^##\s+{re.escape(tag)}\s*\n(?P<body>.*?)(?=^##\s+|\Z)",
                text,
                re.MULTILINE | re.DOTALL,
            )
            if match:
                body = match.group("body").strip()
                body = re.sub(r"\n---\s*$", "", body)
                output.write_text(
                    f"{body}\n\n---\n\n"
                    f"Full release history: [docs/releases.md](https://github.com/{os.environ['GITHUB_REPOSITORY']}/blob/{os.environ['DEFAULT_BRANCH']}/docs/releases.md)\n"
                )
                raise SystemExit

        output.write_text(
            f"Release artifacts for {tag}.\n\n"
            "Detailed notes were not found in `docs/releases.md` for this tag.\n"
        )
        PY
    - name: Create GitHub Release and upload distributions
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.verify-main-tag.outputs.tag_name }}
        name: LynseDB ${{ needs.verify-main-tag.outputs.tag_name }}
        body_path: release-notes.md
        files: |
          dist/*.whl
          dist/*.tar.gz
        fail_on_unmatched_files: true
        make_latest: true

  publish-pypi:
    needs: [verify-main-tag, build-wheels, build-sdist]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
    steps:
    - name: Download distributions
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true
    - name: List distributions
      run: ls -lh dist
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
