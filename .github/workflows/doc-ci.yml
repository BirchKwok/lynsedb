name: doc-ci
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Docs version to deploy, for example 0.3.0"
        required: true
        type: string
permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  prepare-deploy:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check-tag
        name: Check tag commit is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main --prune
          tag_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          main_commit="$(git rev-parse origin/main)"
          echo "Tag commit: $tag_commit"
          echo "origin/main: $main_commit"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Tag $GITHUB_REF_NAME does not point to a commit on main."
            exit 1
          fi
      - id: version
        name: Resolve docs version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$version" ]; then
            echo "Docs version cannot be empty."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch existing docs branch
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin +refs/heads/gh-pages:refs/heads/gh-pages
          fi
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - name: Clear Cache
        run: rm -rf .cache
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material mkdocstrings-python mike
      - run: |
          version="${{ needs.prepare-deploy.outputs.version }}"
          mike deploy --push --update-aliases "$version" latest
          mike set-default --push latest
