services:
  lynsedb:
    image: birchkwok/lynsedb:latest
    command:
      - lynse
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "7637"
      - --data-dir
      - /data
    ports:
      - "7637:7637"
    environment:
      LYNSE_API_KEY: change-me
      LYNSE_SERVER_WORKERS: "4"
      LYNSE_JSON_LIMIT_MB: "256"
      LYNSE_PAYLOAD_LIMIT_MB: "512"
      LYNSE_CLIENT_REQUEST_TIMEOUT_SECS: "300"
      LYNSE_KEEP_ALIVE_SECS: "75"
      LYNSE_SLOW_QUERY_WARN_MS: "1000"
      LYNSE_MAX_TOP_K: "10000"
      LYNSE_MAX_BATCH_VECTORS: "100000"
      LYNSE_MAX_COLLECTION_VECTORS: "10000000"
      LYNSE_MAX_COLLECTION_VECTOR_BYTES: "1099511627776"
      LYNSE_AUDIT_LOG: "true"
    volumes:
      - lynsedb-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7637/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lynsedb-data:
